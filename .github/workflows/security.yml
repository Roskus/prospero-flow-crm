name: Security Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    name: Security Scanning

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@e026a05b6e9f93d8dfe0760d14d553caf4239f15
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath

      - name: Cache Composer packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Larastan (Static Analysis)
        run: vendor/bin/larastan analyse --level=max
        continue-on-error: true

      - name: Run PHP Security Checker
        run: |
          composer require --dev sensiolabs/security-checker
          vendor/bin/security-checker security:check
        continue-on-error: true

      - name: Run Laravel Pint Check
        run: vendor/bin/pint --test --format=json > pint-report.json || true

      - name: Upload Pint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pint-report
          path: pint-report.json
