name: PHP Linting (Pint)
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - 'dependabot/npm_and_yarn/*'

jobs:
  phplint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: "Laravel Pint (latest)"
        uses: aglipanci/laravel-pint-action@36de00d5f5a8a4e12d443e01671daa12a18f4c79
        with:
          preset: laravel
          verboseMode: true
          testMode: true
          configPath: "pint.json"
          pintVersion: 1.8.0
          onlyDirty: true
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7
        with:
          commit_message: PHP Linting (Pint)
          skip_fetch: true
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: PHP Linting (Pint)
          branch: php-lint-${{ github.run_id }}
          title: "PHP Linting (Pint) - Automated PR"
          body: "This PR contains changes made by the PHP Linting (Pint) workflow."
